<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rio Itinerary Board — Mario & Carlos</title>
<style>
  :root{
    --free:#2e7d32;
    --paid:#ef6c00;
    --city:#1565c0;
    --adv:#6a1b9a;
    --bg:#f4f5f7;
    --card-bg:#ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:#222;
  }
  header{
    padding:16px 20px 8px;
  }
  header h1{
    margin:0 0 4px;
    font-size:1.4rem;
  }
  header p{
    margin:0;
    color:#555;
    font-size:0.9rem;
  }
  .legend{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    padding:8px 20px 16px;
    font-size:0.8rem;
    color:#444;
  }
  .legend span{
    display:inline-flex;
    align-items:center;
    gap:5px;
  }
  .dot{
    width:10px;height:10px;border-radius:50%;display:inline-block;
  }
  .board{
    display:flex;
    gap:14px;
    padding:0 20px 30px;
    overflow-x:auto;
    align-items:flex-start;
  }
  .column{
    background:#e9ebee;
    border-radius:10px;
    width:250px;
    min-width:250px;
    padding:10px;
    display:flex;
    flex-direction:column;
    min-height:200px;
  }
  .column h2{
    font-size:0.95rem;
    margin:2px 4px 10px;
    display:flex;
    justify-content:space-between;
  }
  .column h2 .count{
    color:#888;
    font-weight:normal;
    font-size:0.8rem;
  }
  .cardlist{
    flex:1;
    min-height:40px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .cardlist.dragover{
    background:rgba(0,0,0,0.06);
    border-radius:8px;
  }
  .card{
    background:var(--card-bg);
    border-radius:8px;
    padding:10px 10px 8px;
    box-shadow:0 1px 2px rgba(0,0,0,0.15);
    border-left:5px solid #999;
    cursor:grab;
    touch-action:none;
    user-select:none;
    position:relative;
  }
  .card.dragging{
    opacity:0.35;
  }
  .card .title{
    font-weight:600;
    font-size:0.88rem;
    margin-bottom:4px;
    padding-right:16px;
  }
  .card .meta{
    font-size:0.76rem;
    color:#555;
    line-height:1.35;
  }
  .card .del{
    position:absolute;
    top:6px;
    right:6px;
    background:none;
    border:none;
    color:#aaa;
    font-size:0.85rem;
    cursor:pointer;
    line-height:1;
  }
  .card .del:hover{color:#c00;}
  .card.type-free{border-left-color:var(--free);}
  .card.type-paid{border-left-color:var(--paid);}
  .card.type-city{border-left-color:var(--city);}
  .card.type-adv{border-left-color:var(--adv);}

  .addbtn{
    margin-top:8px;
    background:none;
    border:1px dashed #999;
    border-radius:6px;
    padding:6px;
    font-size:0.8rem;
    color:#555;
    cursor:pointer;
    width:100%;
  }
  .addbtn:hover{background:rgba(0,0,0,0.04);}

  .ghost{
    position:fixed;
    pointer-events:none;
    z-index:999;
    opacity:0.9;
    transform:translate(-50%,-50%) scale(1.03);
    box-shadow:0 8px 18px rgba(0,0,0,0.3);
  }

  .toolbar{
    padding:0 20px 10px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .toolbar button{
    background:#fff;
    border:1px solid #ccc;
    border-radius:6px;
    padding:6px 12px;
    font-size:0.8rem;
    cursor:pointer;
  }
  .toolbar button:hover{background:#f0f0f0;}

  .syncstatus{
    font-size:0.78rem;
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:#555;
    margin-left:auto;
  }
  .syncstatus .sdot{
    width:9px;height:9px;border-radius:50%;
    background:#999;
    display:inline-block;
  }
  .syncstatus.online .sdot{background:var(--free);}
  .syncstatus.offline .sdot{background:#999;}
  .syncstatus.error .sdot{background:#c00;}

  /* tiny add-card form */
  .form{
    background:#fff;
    border-radius:8px;
    padding:8px;
    margin-top:8px;
    box-shadow:0 1px 2px rgba(0,0,0,0.15);
  }
  .form input, .form select{
    width:100%;
    margin-bottom:6px;
    padding:5px 6px;
    font-size:0.78rem;
    border:1px solid #ccc;
    border-radius:5px;
  }
  .form .formbtns{
    display:flex;
    gap:6px;
  }
  .form button{
    flex:1;
    font-size:0.78rem;
    padding:5px;
    border-radius:5px;
    border:1px solid #ccc;
    cursor:pointer;
  }
  .form button.primary{
    background:#1565c0;
    color:#fff;
    border-color:#1565c0;
  }
</style>
</head>
<body>

<header>
  <h1>Rio Itinerary Board — Mario &amp; Carlos</h1>
  <p>Drag cards between columns to plan the ~3 weeks in Rio (27 Jun – 20 Jul). Staying at mom's house, Recreio dos Bandeirantes.</p>
</header>

<div class="legend">
  <span><span class="dot" style="background:var(--free)"></span>Free / cheap, right in Recreio</span>
  <span><span class="dot" style="background:var(--paid)"></span>Paid, short drive (Barra)</span>
  <span><span class="dot" style="background:var(--city)"></span>Classic Rio day trip</span>
  <span><span class="dot" style="background:var(--adv)"></span>Dad &amp; son adventure / splurge</span>
</div>

<div class="toolbar">
  <button id="resetBtn">Reset to default layout</button>
  <button id="clearBtn">Clear board (start empty)</button>
  <span class="syncstatus offline" id="syncStatus"><span class="sdot"></span><span class="stext">Saved on this device only</span></span>
</div>

<div class="board" id="board"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<script>
const STORAGE_KEY = "rio-itinerary-board-v1";

// Paste your Firebase web app config here (Firebase console > Project
// settings > Your apps > the </> web app). Until you do, the board just
// saves to this browser only (same as before).
const firebaseConfig = {
  apiKey: "AIzaSyAstvkChWEP_HrLxPFCGDo4GrGing-PzUU",
  authDomain: "trip-br-sa.firebaseapp.com",
  projectId: "trip-br-sa",
  storageBucket: "trip-br-sa.firebasestorage.app",
  messagingSenderId: "433238128762",
  appId: "1:433238128762:web:037efa86b8ebaaf773e3c3",
};

const defaultColumns = [
  { id: "ideas", title: "Ideas (unscheduled)" },
  { id: "week1", title: "Week 1" },
  { id: "week2", title: "Week 2" },
  { id: "week3", title: "Week 3" },
  { id: "booked", title: "Booked / Done" },
];

const defaultCards = [
  { id:"c1", col:"ideas", type:"free", title:"Praia do Recreio", meta:"📍 Recreio · 👥 Both<br>💰 Free — beach day, surf vibe but family-friendly" },
  { id:"c2", col:"ideas", type:"free", title:"Praia do Pontal", meta:"📍 Recreio · 👥 Both<br>💰 Free — calmer water on the right side, good for swimming" },
  { id:"c3", col:"ideas", type:"free", title:"Parque Chico Mendes", meta:"📍 Recreio · 👥 Both<br>💰 Free — easy trails, sloths &amp; caimans, playground, picnic" },
  { id:"c4", col:"ideas", type:"free", title:"Beach volleyball / futevôlei", meta:"📍 Recreio · 👥 Both<br>💰 Free — borrow a ball on the beach" },
  { id:"c5", col:"ideas", type:"free", title:"Bike ride, beachfront ciclovia", meta:"📍 Recreio · 👥 Both<br>💰 ~R$20-40/hr rental (~AUD 6-11)" },
  { id:"c6", col:"ideas", type:"paid", title:"Rio Water Planet", meta:"📍 Barra/Vargem Grande · 👥 Both<br>💰 Adult ~R$120 / Child ~R$60 (~AUD 33/17)" },
  { id:"c7", col:"ideas", type:"paid", title:"Ilha da Gigoia boat trip", meta:"📍 Barra · 👥 Both<br>💰 R$3-7 crossing, or R$15-30 for a longer lagoon tour" },
  { id:"c8", col:"ideas", type:"paid", title:"Barra World — Nerf/Gel Blaster arena", meta:"📍 Barra · 👥 Both<br>💰 ~R$60-100/session" },
  { id:"c9", col:"ideas", type:"paid", title:"Museu Casa do Pontal", meta:"📍 Barra · 👥 Both<br>💰 Free, ~R$20 suggested donation — folk art, low-key" },
  { id:"c10", col:"ideas", type:"paid", title:"Surf lesson, Macumba/Recreio", meta:"📍 Recreio · 👥 Both<br>💰 ~R$110-260/lesson — dad &amp; son lesson together" },
  { id:"c11", col:"ideas", type:"city", title:"Sugarloaf cable car", meta:"📍 Urca · 👥 Both<br>💰 Adult R$199 / Child(6-21) R$99 (~AUD 55/27)" },
  { id:"c12", col:"ideas", type:"city", title:"Christ the Redeemer (Corcovado train)", meta:"📍 Cosme Velho · 👥 Both<br>💰 Adult R$134 / Child(7-11) R$107 (~AUD 37/30)" },
  { id:"c13", col:"ideas", type:"city", title:"AquaRio (aquarium, sharks)", meta:"📍 Gamboa · 👥 Both<br>💰 Adult ~R$80 / Child ~R$60 (~AUD 22/17)" },
  { id:"c14", col:"ideas", type:"city", title:"BioParque do Rio (zoo)", meta:"📍 Quinta da Boa Vista · 👥 Both<br>💰 Adult ~R$40 / Child R$10-20 (~AUD 11/3-6)" },
  { id:"c15", col:"ideas", type:"adv", title:"Go-kart racing", meta:"📍 Barra/city · 👥 Both<br>💰 ~R$60-150/session — most tracks OK for 7yo, check min age" },
  { id:"c16", col:"ideas", type:"adv", title:"Maracanã Stadium tour", meta:"📍 Maracanã · 👥 Both<br>💰 Adult ~R$94 / Half ~R$47, under 5 free" },
  { id:"c17", col:"ideas", type:"adv", title:"Helicopter tour over Rio", meta:"📍 Lagoa/Urca · 👥 Both<br>💰 From ~R$690-1040/person (15-30min) — splurge" },
];

let state = load();

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { columns: defaultColumns, cards: defaultCards };
}
function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){}
  if(boardDocRef){
    boardDocRef.set(state).catch(() => setSyncStatus("error", "Couldn't reach the cloud — saved on this device only"));
  }
}

const board = document.getElementById("board");

function render(){
  board.innerHTML = "";
  state.columns.forEach(col => {
    const colCards = state.cards.filter(c => c.col === col.id);
    const colEl = document.createElement("div");
    colEl.className = "column";
    colEl.dataset.col = col.id;
    colEl.innerHTML = `<h2>${col.title} <span class="count">${colCards.length}</span></h2>`;

    const list = document.createElement("div");
    list.className = "cardlist";
    list.dataset.col = col.id;
    colCards.forEach(c => list.appendChild(buildCard(c)));
    colEl.appendChild(list);

    const addBtn = document.createElement("button");
    addBtn.className = "addbtn";
    addBtn.textContent = "+ Add idea";
    addBtn.onclick = () => showForm(colEl, col.id);
    colEl.appendChild(addBtn);

    board.appendChild(colEl);
  });
}

function buildCard(c){
  const el = document.createElement("div");
  el.className = `card type-${c.type}`;
  el.dataset.id = c.id;
  el.innerHTML = `
    <button class="del" title="remove">×</button>
    <div class="title">${c.title}</div>
    <div class="meta">${c.meta}</div>
  `;
  el.querySelector(".del").onclick = (e) => {
    e.stopPropagation();
    state.cards = state.cards.filter(x => x.id !== c.id);
    save(); render();
  };
  attachDrag(el, c.id);
  return el;
}

function showForm(colEl, colId){
  if(colEl.querySelector(".form")) return;
  const form = document.createElement("div");
  form.className = "form";
  form.innerHTML = `
    <input type="text" placeholder="Title" class="f-title">
    <input type="text" placeholder="Price / notes" class="f-meta">
    <select class="f-type">
      <option value="free">Free / Recreio</option>
      <option value="paid">Paid / short drive</option>
      <option value="city">Classic Rio day trip</option>
      <option value="adv">Adventure / splurge</option>
    </select>
    <div class="formbtns">
      <button class="primary">Add</button>
      <button class="cancel">Cancel</button>
    </div>
  `;
  form.querySelector(".primary").onclick = () => {
    const title = form.querySelector(".f-title").value.trim();
    const meta = form.querySelector(".f-meta").value.trim();
    const type = form.querySelector(".f-type").value;
    if(!title) return;
    state.cards.push({ id:"c"+Date.now(), col:colId, type, title, meta: meta || "" });
    save(); render();
  };
  form.querySelector(".cancel").onclick = () => render();
  colEl.insertBefore(form, colEl.querySelector(".addbtn"));
}

// pointer-based drag (works on touch + mouse)
let dragData = null;

function attachDrag(el, id){
  el.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    const rect = el.getBoundingClientRect();
    dragData = {
      id,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
      width: rect.width,
    };
    el.classList.add("dragging");

    const ghost = el.cloneNode(true);
    ghost.classList.remove("dragging");
    ghost.classList.add("ghost");
    ghost.style.width = rect.width + "px";
    ghost.style.left = e.clientX + "px";
    ghost.style.top = e.clientY + "px";
    document.body.appendChild(ghost);
    dragData.ghost = ghost;

    function move(ev){
      ghost.style.left = ev.clientX + "px";
      ghost.style.top = ev.clientY + "px";
      document.querySelectorAll(".cardlist").forEach(l => l.classList.remove("dragover"));
      const under = document.elementFromPoint(ev.clientX, ev.clientY);
      const list = under && under.closest(".cardlist");
      if(list) list.classList.add("dragover");
    }
    function up(ev){
      document.removeEventListener("pointermove", move);
      document.removeEventListener("pointerup", up);
      ghost.remove();
      el.classList.remove("dragging");
      document.querySelectorAll(".cardlist").forEach(l => l.classList.remove("dragover"));

      const under = document.elementFromPoint(ev.clientX, ev.clientY);
      const list = under && under.closest(".cardlist");
      if(list){
        const card = state.cards.find(c => c.id === id);
        if(card) card.col = list.dataset.col;
        save();
      }
      render();
    }
    document.addEventListener("pointermove", move);
    document.addEventListener("pointerup", up);
  });
}

document.getElementById("resetBtn").onclick = () => {
  if(confirm("Reset board to the default suggestions? This clears any changes.")){
    state = { columns: defaultColumns, cards: defaultCards };
    save(); render();
  }
};
document.getElementById("clearBtn").onclick = () => {
  if(confirm("Clear all cards from the board?")){
    state.cards = [];
    save(); render();
  }
};

// --- Online sync (Firebase Firestore) ---
// Only activates once you paste real config values above. Until then
// this whole block is skipped and the board behaves exactly as before
// (saved to this browser only).
let boardDocRef = null;

function setSyncStatus(mode, text){
  const el = document.getElementById("syncStatus");
  el.className = "syncstatus " + mode;
  el.querySelector(".stext").textContent = text || {
    online: "Synced online — live on all your devices",
    offline: "Saved on this device only",
    error: "Sync error — saved on this device only",
  }[mode];
}

const firebaseReady = typeof firebase !== "undefined"
  && firebaseConfig.apiKey
  && !firebaseConfig.apiKey.startsWith("PASTE_");

if(firebaseReady){
  try{
    firebase.initializeApp(firebaseConfig);
    boardDocRef = firebase.firestore().collection("rio-board").doc("state");
    setSyncStatus("offline", "Connecting…");

    boardDocRef.onSnapshot(
      (doc) => {
        if(doc.exists){
          state = doc.data();
        }else{
          boardDocRef.set(state).catch(() => {});
        }
        render();
        setSyncStatus("online");
      },
      () => setSyncStatus("error")
    );
  }catch(e){
    boardDocRef = null;
    setSyncStatus("error");
  }
}

render();
</script>
</body>
</html>
